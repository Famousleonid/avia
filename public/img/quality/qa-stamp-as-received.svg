<svg xmlns="http://www.w3.org/2000/svg" width="340" height="116" viewBox="0 0 340 116" role="img" aria-labelledby="stamp-title stamp-desc">
    <title id="stamp-title">As Received QA stamp</title>
    <desc id="stamp-desc">Distressed blue rectangular stamp reading AS RECEIVED.</desc>
    <defs>
        <filter id="soft-ink" x="-8%" y="-14%" width="116%" height="128%">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="23" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <mask id="stamp-wear" maskUnits="userSpaceOnUse">
